services:                                                                                                                                                                                      
  # 데이터베이스 서비스 (PostgreSQL)                                                                                                                                                           
  postgres-db:                                                                                                                                                                                 
    image: postgres:15-alpine                                                                                                                                                                  
    container_name: juyeon-postgres                                                                                                                                                            
    restart: always                                                                                                                                                                            
    environment:                                                                                                                                                                               
      POSTGRES_USER: ${DB_USER:-juyeon}                                                                                                                                                        
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mysecretpassword}                                                                                                                                      
      POSTGRES_DB: ${DB_NAME:-juyeon_twitter}                                                                                                                                                  
    ports:                                                                                                                                                                                     
      - "5432:5432"                                                                                                                                                                            
    volumes:                                                                                                                                                                                   
      - postgres-data:/var/lib/postgresql/data                                                                                                                                                 
    networks:                                                                                                                                                                                  
      - juyeon-network                                                                                                                                                                         
                                                                                                                                                                                                
  # Next.js 애플리케이션 서비스                                                                                                                                                                
  wintergreen-app:                                                                                                                                                                             
    build:                                                                                                                                                                                     
      context: .                                                                                                                                                                               
      dockerfile: Dockerfile                                                                                                                                                                   
    container_name: juyeon-next-app                                                                                                                                                            
    restart: always                                                                                                                                                                            
    ports:                                                                                                                                                                                     
      - "3000:3000"                                                                                                                                                                            
    environment:                                                                                                                                                                               
      DATABASE_URL: postgresql://${DB_USER:-juyeon}:${DB_PASSWORD:-mysecretpassword}@postgres-db:5432/${DB_NAME:-juyeon_twitter}?schema=public                                                                                                                                                                                                                                          
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-supersecretnextauthkeyforyoutubebrandclub}                                                                                                           
      NEXTAUTH_URL: "http://localhost:3000"       
      INVITE_CODE: "anything"                                                                                                                                             
    depends_on:                                                                                                                                                                                
      - postgres-db                                                                                                                                                                            
    networks:                                                                                                                                                                                  
      - juyeon-network                                                                                                                                                                         
                                                                                                                                                                                                
volumes:                                                                                                                                                                                       
  postgres-data:                                                                                                                                                                               
                                                                                                                                                                                                
networks:                                                                                                                                                                                      
  juyeon-network:                                                                                                                                                                               